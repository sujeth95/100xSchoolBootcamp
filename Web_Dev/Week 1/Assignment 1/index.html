<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./index.css" />
</head>
<body>
    <div id="container">
        <!-- <h2 id="logo">ElevenLabs</h2> -->
        <h1>Create an account</h1>

        <button id="google-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">
            Sign up with Google
        </button>
        <div id="divider"></div>

        <form>
            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Password</label>
            <div id="password-box">
                <input type="password" placeholder="Enter Your Password" >
                <span id="eye">👁</span>
            </div>

            <button id="signup-btn">Sign up</button>
        </form>

        <p id="sign-in">
            Already registered?
            <a href="#">Sign in</a>
        </p>
    </div>

    <p id="terms">
        By continuing, you agree to out <a target="_blank" href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </p>
</body>
</html>
