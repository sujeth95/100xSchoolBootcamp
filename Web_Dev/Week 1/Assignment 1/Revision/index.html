<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloning a local page</title>
    <link rel="stylesheet" href="./index.css" />
</head>

<body>

    <div id="header">
        <h1>IIElevenLabs</h1>
    </div>
    <div id="container">
        <div>
            <h1>Create an account</h1>
        </div>

        <div id="signup-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="google-image" />
            <p>Sign up with Google</p>
        </div>
        <div id="divider"></div>

        <form id="forms">
            <label>Email</label>
            <input type="email" placeholder="Enter Your Email" />
            <label>Password</label>
            <div id="password-box">
                <input type="password" placeholder="Enter Your Password">
                <span id="eye">&#128065</span>
            </div>

            <button>Sign up</button>
        </form>

        <div id="signin-btn">
        <p>Already registered?</p>
        <a href="#">Sign in</a>
        </div>
    </div>
    <div id="footer">
        By continuing, you agree to out <a target="_blank" href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>
</body>

</html>
